<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍之國防衛戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #111827; color: white; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-wrapper { display: flex; justify-content: center; align-items: flex-start; padding: 20px; gap: 20px; min-height: 100vh; }
        canvas { background-color: #22c55e; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); cursor: crosshair; }
        .tower-btn { transition: all 0.2s; }
        .tower-btn.selected { border-color: #fbbf24; background-color: rgba(251, 191, 36, 0.2); transform: scale(1.05); }
        .tower-btn:hover:not(.selected) { background-color: rgba(255, 255, 255, 0.1); }
        /* 背景色庫 (對應10關) */
        .bg-level-1 { background-color: #4ade80; } /* 草原 */
        .bg-level-2 { background-color: #fde047; } /* 沙漠 */
        .bg-level-3 { background-color: #9ca3af; } /* 石陣 */
        .bg-level-4 { background-color: #f87171; } /* 火山 */
        .bg-level-5 { background-color: #c084fc; } /* 毒沼 */
        .bg-level-6 { background-color: #60a5fa; } /* 冰原 */
        .bg-level-7 { background-color: #84cc16; } /* 密林 */
        .bg-level-8 { background-color: #b91c1c; } /* 血谷 */
        .bg-level-9 { background-color: #1e3a8a; } /* 深淵 */
        .bg-level-10 { background-color: #0f172a; } /* 魔王城 */
    </style>
</head>
<body>

<div id="game-wrapper">
    <!-- 遊戲畫布 -->
    <div class="relative">
        <canvas id="gameCanvas" width="800" height="600" class="bg-level-1"></canvas>
        <div id="overlay" class="absolute inset-0 bg-black bg-opacity-75 flex flex-col items-center justify-center rounded-lg z-10 hidden">
            <h1 id="overlay-title" class="text-5xl font-bold text-yellow-400 mb-4">過關！</h1>
            <p id="overlay-desc" class="text-xl mb-6">準備迎接下一波會考魔王</p>
            <button id="btn-next-level" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded text-xl font-bold transition">進入下一關</button>
            <button id="btn-restart" class="px-6 py-3 bg-red-600 hover:bg-red-500 rounded text-xl font-bold transition hidden">重新開始</button>
        </div>
    </div>

    <!-- UI 面板 -->
    <div class="w-80 bg-gray-800 rounded-lg shadow-xl p-5 flex flex-col gap-5 border border-gray-700">
        <div class="text-center pb-4 border-b border-gray-600">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-red-500">忍之國防衛戰</h1>
            <p class="text-gray-400 text-sm mt-1">對抗會考大魔王</p>
        </div>

        <!-- 君主等級與狀態 -->
        <div class="bg-gray-900 p-4 rounded border border-gray-700">
            <div class="flex justify-between items-center mb-2">
                <span class="text-lg font-bold text-yellow-400">君主等級: <span id="ui-lord-level">1</span></span>
                <span class="text-yellow-300 font-bold">金幣: <span id="ui-gold">300</span></span>
            </div>
            <div class="w-full bg-gray-700 rounded-full h-4 mb-2 relative overflow-hidden">
                <div id="ui-hp-bar" class="bg-red-500 h-4 rounded-full transition-all duration-300" style="width: 100%;"></div>
            </div>
            <div class="text-right text-sm text-gray-300 mb-3">君主護衛力: <span id="ui-hp">20</span> / <span id="ui-max-hp">20</span></div>
            
            <button id="btn-upgrade-lord" class="w-full py-2 bg-gradient-to-r from-yellow-600 to-yellow-500 hover:from-yellow-500 hover:to-yellow-400 text-black font-bold rounded shadow transition">
                升級君主 (花費: <span id="ui-upgrade-cost">100</span>)
            </button>
        </div>

        <!-- 關卡資訊 -->
        <div class="flex justify-between items-center text-lg font-bold">
            <span class="text-blue-400">當前關卡: <span id="ui-level">1</span> / 10</span>
            <span class="text-red-400">剩餘魔王: <span id="ui-enemies">0</span></span>
        </div>

        <!-- 忍者兵種選擇 -->
        <div class="flex-1">
            <h3 class="text-gray-400 font-bold mb-3">招募忍者 (點擊選擇，再點擊地圖放置)</h3>
            <div class="grid grid-cols-1 gap-2" id="tower-container">
                <!-- 動態生成按鈕 -->
            </div>
        </div>

        <!-- 控制按鈕 -->
        <button id="btn-start-wave" class="w-full py-3 bg-green-600 hover:bg-green-500 rounded text-xl font-bold shadow-lg transition animate-pulse">
            召喚敵軍 (開始戰鬥)
        </button>
    </div>
</div>

<script>
/** 遊戲設定常數 **/
const TOWER_TYPES = {
    prog: { id: 'prog', name: '程式設計忍者', cost: 50, color: '#ef4444', range: 120, damage: 10, cooldown: 15, desc: '攻速極快，基礎傷害' },
    data: { id: 'data', name: '資料處理忍者', cost: 80, color: '#3b82f6', range: 180, damage: 45, cooldown: 60, desc: '射速慢，單發傷害極高' },
    proj: { id: 'proj', name: '專題製作忍者', cost: 120, color: '#22c55e', range: 350, damage: 80, cooldown: 90, desc: '超遠程狙擊，威力驚人' },
    sys:  { id: 'sys', name: '系統理解忍者', cost: 100, color: '#eab308', range: 150, damage: 5, cooldown: 30, desc: '傷害低，但能牽制減速敵人', effect: 'slow' },
    prob: { id: 'prob', name: '問題解決忍者', cost: 150, color: '#a855f7', range: 90, damage: 30, cooldown: 10, desc: '極近距離，超高爆發輸出' }
};

const ENEMY_TYPES = [
    { name: '國文魔王', color: '#fca5a5', hpMult: 1.0, spdMult: 1.0, damage: 1 },
    { name: '英文魔王', color: '#93c5fd', hpMult: 0.8, spdMult: 1.5, damage: 1 },
    { name: '數學魔王', color: '#86efac', hpMult: 2.5, spdMult: 0.7, damage: 2 }, // 防禦最高，血最多
    { name: '社會魔王', color: '#fde047', hpMult: 1.5, spdMult: 0.9, damage: 1 },
    { name: '自然魔王', color: '#d8b4fe', hpMult: 1.2, spdMult: 1.2, damage: 2 }
];

// 10種不同的地圖路徑 (800x600)
const PATHS = [
    // 1. S型
    [{x: -50, y: 150}, {x: 650, y: 150}, {x: 650, y: 450}, {x: 150, y: 450}, {x: 150, y: 650}],
    // 2. U型折返
    [{x: 100, y: -50}, {x: 100, y: 500}, {x: 700, y: 500}, {x: 700, y: 100}, {x: 300, y: 100}, {x: 300, y: -50}],
    // 3. Z型閃電
    [{x: -50, y: 100}, {x: 700, y: 100}, {x: 100, y: 500}, {x: 850, y: 500}],
    // 4. 雙迴圈
    [{x: -50, y: 300}, {x: 200, y: 300}, {x: 200, y: 100}, {x: 400, y: 100}, {x: 400, y: 500}, {x: 600, y: 500}, {x: 600, y: 300}, {x: 850, y: 300}],
    // 5. 迷宮階梯
    [{x: 100, y: 650}, {x: 100, y: 450}, {x: 300, y: 450}, {x: 300, y: 250}, {x: 500, y: 250}, {x: 500, y: 50}, {x: 700, y: 50}, {x: 700, y: 650}],
    // 6. 螺旋向內
    [{x: -50, y: 50}, {x: 750, y: 50}, {x: 750, y: 550}, {x: 50, y: 550}, {x: 50, y: 150}, {x: 600, y: 150}, {x: 600, y: 400}, {x: 200, y: 400}, {x: 200, y: 250}, {x: 400, y: 250}],
    // 7. W型
    [{x: -50, y: 100}, {x: 200, y: 500}, {x: 400, y: 100}, {x: 600, y: 500}, {x: 850, y: 100}],
    // 8. 交叉穿梭
    [{x: 400, y: -50}, {x: 400, y: 250}, {x: 100, y: 250}, {x: 100, y: 450}, {x: 700, y: 450}, {x: 700, y: 100}, {x: 850, y: 100}],
    // 9. 蛇行
    [{x: 50, y: 650}, {x: 50, y: 100}, {x: 200, y: 100}, {x: 200, y: 500}, {x: 350, y: 500}, {x: 350, y: 100}, {x: 500, y: 100}, {x: 500, y: 500}, {x: 650, y: 500}, {x: 650, y: 100}, {x: 850, y: 100}],
    // 10. 魔王終極試煉
    [{x: -50, y: 300}, {x: 200, y: 300}, {x: 200, y: 100}, {x: 600, y: 100}, {x: 600, y: 500}, {x: 100, y: 500}, {x: 100, y: 400}, {x: 850, y: 400}]
];

/** 遊戲全域變數 **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let animationId;
let isPlaying = false;
let waveActive = false;
let frameCount = 0;

let gold = 300;
let level = 1;
let lordLevel = 1;
let lordMaxHp = 20;
let lordHp = 20;

let towers = [];
let enemies = [];
let particles = [];
let floatingTexts = [];
let selectedTowerType = null;

let enemySpawnTimer = 0;
let enemiesToSpawn = 0;
let currentPath = [];

/** DOM 元素 **/
const uiGold = document.getElementById('ui-gold');
const uiLevel = document.getElementById('ui-level');
const uiEnemies = document.getElementById('ui-enemies');
const uiLordLevel = document.getElementById('ui-lord-level');
const uiHp = document.getElementById('ui-hp');
const uiMaxHp = document.getElementById('ui-max-hp');
const uiHpBar = document.getElementById('ui-hp-bar');
const uiUpgradeCost = document.getElementById('ui-upgrade-cost');
const btnUpgrade = document.getElementById('btn-upgrade-lord');
const btnStartWave = document.getElementById('btn-start-wave');
const overlay = document.getElementById('overlay');
const btnNextLevel = document.getElementById('btn-next-level');
const btnRestart = document.getElementById('btn-restart');
const towerContainer = document.getElementById('tower-container');

/** 輔助數學函數 **/
function getDistance(p1, p2) {
    return Math.hypot(p1.x - p2.x, p1.y - p2.y);
}

function distToSegmentSquared(p, v, w) {
    let l2 = getDistance(v, w) ** 2;
    if (l2 === 0) return getDistance(p, v) ** 2;
    let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
    t = Math.max(0, Math.min(1, t));
    return getDistance(p, { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) }) ** 2;
}

/** 類別定義 **/
class Enemy {
    constructor(path, levelScale) {
        this.path = path;
        this.waypointIndex = 0;
        this.x = path[0].x;
        this.y = path[0].y;
        
        // 隨機決定魔王類型
        const type = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
        this.name = type.name;
        this.color = type.color;
        
        // 屬性隨關卡成長
        const baseHp = 40 + (levelScale * 25);
        this.maxHp = baseHp * type.hpMult;
        this.hp = this.maxHp;
        this.speed = (1.2 + (levelScale * 0.1)) * type.spdMult;
        this.baseSpeed = this.speed;
        this.damage = type.damage;
        
        this.radius = 16;
        this.reward = 10 + Math.floor(levelScale * 2);
        
        this.slowTimer = 0;
    }

    update() {
        // 減速效果處理
        if (this.slowTimer > 0) {
            this.slowTimer--;
            this.speed = this.baseSpeed * 0.5;
        } else {
            this.speed = this.baseSpeed;
        }

        // 移動邏輯
        const target = this.path[this.waypointIndex + 1];
        if (!target) return; // 已經到終點

        const dist = getDistance(this, target);
        if (dist <= this.speed) {
            this.x = target.x;
            this.y = target.y;
            this.waypointIndex++;
        } else {
            const angle = Math.atan2(target.y - this.y, target.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;
        }
    }

    draw() {
        // 畫魔王身體
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 畫血條
        const hpPercent = this.hp / this.maxHp;
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(this.x - 15, this.y - 25, 30, 4);
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(this.x - 15, this.y - 25, 30 * hpPercent, 4);

        // 畫科目文字
        ctx.fillStyle = '#000';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.name[0], this.x, this.y);
    }
}

class Tower {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type;
        this.radius = 18;
        this.cooldownTimer = 0;
        this.angle = 0;
    }

    update() {
        if (this.cooldownTimer > 0) this.cooldownTimer--;

        // 尋找目標
        let target = null;
        let minTargetDist = Infinity;

        for (let enemy of enemies) {
            const dist = getDistance(this, enemy);
            if (dist <= this.type.range) {
                // 優先打走得最遠的 (waypointIndex 最大，或同waypoint距離終點最近)
                // 為簡單化，這裡打最接近塔的
                if (dist < minTargetDist) {
                    minTargetDist = dist;
                    target = enemy;
                }
            }
        }

        if (target) {
            this.angle = Math.atan2(target.y - this.y, target.x - this.x);
            if (this.cooldownTimer <= 0) {
                this.shoot(target);
                this.cooldownTimer = this.type.cooldown;
            }
        }
    }

    shoot(target) {
        particles.push(new Projectile(this.x, this.y, target, this.type));
    }

    draw() {
        // 塔底座
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 2, 0, Math.PI * 2);
        ctx.fill();

        // 塔身
        ctx.fillStyle = this.type.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 砲管
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, -4, this.radius + 10, 8);
        ctx.restore();

        // 忍者標誌(簡單示意)
        ctx.fillStyle = '#fff';
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText("忍", this.x, this.y);
    }
}

class Projectile {
    constructor(x, y, target, towerType) {
        this.x = x;
        this.y = y;
        this.target = target;
        this.type = towerType;
        this.speed = 8;
        this.active = true;
    }

    update() {
        if (!this.target || this.target.hp <= 0) {
            this.active = false;
            return;
        }

        const angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;

        if (getDistance(this, this.target) < this.target.radius + 5) {
            this.hit();
        }
    }

    hit() {
        this.active = false;
        this.target.hp -= this.type.damage;
        
        // 減速效果
        if (this.type.effect === 'slow') {
            this.target.slowTimer = 60; // 減速 1 秒 (60幀)
        }

        // 跳傷害數字
        floatingTexts.push(new FloatingText(this.target.x, this.target.y, `-${this.type.damage}`, '#ffeb3b'));

        // 擊殺判定
        if (this.target.hp <= 0) {
            gold += this.target.reward;
            floatingTexts.push(new FloatingText(this.target.x, this.target.y - 20, `+${this.target.reward}G`, '#4ade80'));
            updateUI();
        }
    }

    draw() {
        ctx.fillStyle = this.type.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
        ctx.fill();
    }
}

class FloatingText {
    constructor(x, y, text, color) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 30;
    }
    update() {
        this.y -= 1;
        this.life--;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = Math.max(0, this.life / 30);
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1.0;
    }
}

/** 遊戲核心邏輯 **/
function initUI() {
    // 生成塔選擇按鈕
    towerContainer.innerHTML = '';
    for (const key in TOWER_TYPES) {
        const t = TOWER_TYPES[key];
        const btn = document.createElement('div');
        btn.className = 'tower-btn flex items-center p-2 rounded cursor-pointer border-2 border-transparent';
        btn.innerHTML = `
            <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-white mr-3 border-2 border-white" style="background-color: ${t.color}">忍</div>
            <div class="flex-1">
                <div class="font-bold text-sm text-white">${t.name} <span class="text-yellow-400 text-xs">(${t.cost}G)</span></div>
                <div class="text-xs text-gray-400">${t.desc}</div>
            </div>
        `;
        btn.onclick = () => selectTower(key, btn);
        towerContainer.appendChild(btn);
    }

    btnUpgrade.onclick = upgradeLord;
    btnStartWave.onclick = startWave;
    btnNextLevel.onclick = nextLevel;
    btnRestart.onclick = restartGame;

    // 畫布點擊放置塔
    canvas.addEventListener('click', (e) => {
        if (!selectedTowerType || !waveActive) return; // 戰鬥中才能放塔(或隨時可放)
        
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        placeTower(x, y);
    });

    // 滑鼠移動顯示範圍預覽
    canvas.addEventListener('mousemove', (e) => {
        if (!selectedTowerType) return;
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });
}

let mouseX = -100;
let mouseY = -100;

function selectTower(typeKey, btnElem) {
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
    if (selectedTowerType === TOWER_TYPES[typeKey]) {
        selectedTowerType = null; // 取消選擇
    } else {
        selectedTowerType = TOWER_TYPES[typeKey];
        btnElem.classList.add('selected');
    }
}

function canPlaceTower(x, y) {
    const radius = 18;
    // 檢查金錢
    if (gold < selectedTowerType.cost) return false;
    
    // 檢查是否與其他塔重疊
    for (let t of towers) {
        if (getDistance({x, y}, t) < radius * 2 + 5) return false;
    }

    // 檢查是否壓在路徑上 (路徑寬度大約 40)
    for (let i = 0; i < currentPath.length - 1; i++) {
        const distSq = distToSegmentSquared({x, y}, currentPath[i], currentPath[i+1]);
        if (distSq < (20 + radius) ** 2) return false;
    }
    
    return true;
}

function placeTower(x, y) {
    if (canPlaceTower(x, y)) {
        gold -= selectedTowerType.cost;
        towers.push(new Tower(x, y, selectedTowerType));
        updateUI();
        
        // 放完後取消選取以防誤觸
        selectedTowerType = null;
        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
    }
}

function upgradeLord() {
    const cost = lordLevel * 100;
    if (gold >= cost) {
        gold -= cost;
        lordLevel++;
        lordMaxHp += 20; // 每級+20血量上限
        lordHp = lordMaxHp; // 升級順便補滿血
        
        floatingTexts.push(new FloatingText(400, 300, `君主升級至 Lv.${lordLevel}!`, '#fbbf24'));
        updateUI();
    }
}

function updateUI() {
    uiGold.innerText = gold;
    uiLevel.innerText = level;
    uiLordLevel.innerText = lordLevel;
    uiHp.innerText = lordHp;
    uiMaxHp.innerText = lordMaxHp;
    
    const hpPercent = Math.max(0, (lordHp / lordMaxHp) * 100);
    uiHpBar.style.width = hpPercent + '%';
    
    // 血量顏色變化
    if (hpPercent > 50) uiHpBar.className = 'h-4 rounded-full transition-all duration-300 bg-green-500';
    else if (hpPercent > 20) uiHpBar.className = 'h-4 rounded-full transition-all duration-300 bg-yellow-500';
    else uiHpBar.className = 'h-4 rounded-full transition-all duration-300 bg-red-600 animate-pulse';

    const cost = lordLevel * 100;
    uiUpgradeCost.innerText = cost;
    if (gold < cost) {
        btnUpgrade.classList.add('opacity-50', 'cursor-not-allowed');
    } else {
        btnUpgrade.classList.remove('opacity-50', 'cursor-not-allowed');
    }

    let activeEnemies = enemies.length + enemiesToSpawn;
    uiEnemies.innerText = activeEnemies;
}

function loadLevel() {
    currentPath = PATHS[level - 1];
    towers = []; // 每關清空防禦塔 (重置佈局，增加策略性)
    enemies = [];
    particles = [];
    floatingTexts = [];
    
    // 改變背景色
    canvas.className = `bg-level-${level}`;
    
    waveActive = false;
    btnStartWave.classList.remove('hidden');
    overlay.classList.add('hidden');
    
    updateUI();
    draw(); // 初始繪製
}

function startWave() {
    if (waveActive) return;
    waveActive = true;
    btnStartWave.classList.add('hidden');
    
    enemiesToSpawn = 10 + (level * 5); // 隨關卡增加敵人數
    enemySpawnTimer = 0;
    
    if (!isPlaying) {
        isPlaying = true;
        gameLoop();
    }
}

function drawPath() {
    ctx.beginPath();
    ctx.moveTo(currentPath[0].x, currentPath[0].y);
    for (let i = 1; i < currentPath.length; i++) {
        ctx.lineTo(currentPath[i].x, currentPath[i].y);
    }
    // 路徑底色
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 40;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    
    // 路徑內線
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 15]);
    ctx.stroke();
    ctx.setLineDash([]);
}

function spawnEnemy() {
    if (enemiesToSpawn > 0 && enemySpawnTimer <= 0) {
        enemies.push(new Enemy(currentPath, level));
        enemiesToSpawn--;
        enemySpawnTimer = 40 - (level * 1.5); // 隨關卡加快生成速度
        updateUI();
    }
    enemySpawnTimer--;
}

function showOverlay(title, desc, isGameOver) {
    waveActive = false;
    overlay.classList.remove('hidden');
    document.getElementById('overlay-title').innerText = title;
    document.getElementById('overlay-desc').innerText = desc;
    
    if (isGameOver) {
        document.getElementById('overlay-title').className = "text-5xl font-bold text-red-500 mb-4";
        btnNextLevel.classList.add('hidden');
        btnRestart.classList.remove('hidden');
    } else {
        document.getElementById('overlay-title').className = "text-5xl font-bold text-yellow-400 mb-4";
        btnNextLevel.classList.remove('hidden');
        btnRestart.classList.add('hidden');
        if (level === 10) {
            document.getElementById('overlay-desc').innerText = "你成功守護了忍之國！";
            btnNextLevel.innerText = "重新遊玩";
        } else {
            btnNextLevel.innerText = "進入下一關";
        }
    }
}

function nextLevel() {
    if (level === 10) {
        restartGame();
    } else {
        level++;
        gold += 200; // 過關獎勵
        loadLevel();
    }
}

function restartGame() {
    level = 1;
    gold = 300;
    lordLevel = 1;
    lordMaxHp = 20;
    lordHp = 20;
    loadLevel();
}

function gameLoop() {
    if (!isPlaying) return;
    
    update();
    draw();
    
    frameCount++;
    animationId = requestAnimationFrame(gameLoop);
}

function update() {
    if (!waveActive) return;

    spawnEnemy();

    // 更新塔
    towers.forEach(t => t.update());

    // 更新敵人
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.update();

        // 到達終點
        if (e.waypointIndex >= currentPath.length - 1) {
            lordHp -= e.damage;
            enemies.splice(i, 1);
            updateUI();
            
            // 畫面震動效果 (簡單版)
            canvas.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
            setTimeout(() => canvas.style.transform = 'translate(0,0)', 50);

            if (lordHp <= 0) {
                lordHp = 0;
                updateUI();
                showOverlay("君主倒下...", "會考大魔王摧毀了忍之國", true);
                return;
            }
        }
        // 死亡
        else if (e.hp <= 0) {
            enemies.splice(i, 1);
            updateUI();
        }
    }

    // 更新投射物
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (!particles[i].active) particles.splice(i, 1);
    }

    // 更新漂浮文字
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        floatingTexts[i].update();
        if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
    }

    // 檢查過關
    if (enemies.length === 0 && enemiesToSpawn === 0) {
        showOverlay(`第 ${level} 關 通過！`, `成功抵擋了會考魔王的進攻`, false);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawPath();

    // 畫預覽放置範圍
    if (selectedTowerType && mouseX > 0 && mouseY > 0) {
        const canPlace = canPlaceTower(mouseX, mouseY);
        
        // 攻擊範圍圈
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, selectedTowerType.range, 0, Math.PI * 2);
        ctx.fillStyle = canPlace ? 'rgba(255, 255, 255, 0.1)' : 'rgba(239, 68, 68, 0.2)';
        ctx.fill();
        ctx.strokeStyle = canPlace ? 'rgba(255, 255, 255, 0.5)' : 'rgba(239, 68, 68, 0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 塔本體預覽
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 18, 0, Math.PI * 2);
        ctx.fillStyle = selectedTowerType.color;
        ctx.globalAlpha = 0.5;
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }

    // 依序繪製物件
    towers.forEach(t => t.draw());
    enemies.forEach(e => e.draw());
    particles.forEach(p => p.draw());
    floatingTexts.forEach(ft => ft.draw());
}

/** 初始化遊戲 **/
window.onload = () => {
    initUI();
    loadLevel();
};

</script>
</body>
</html>
