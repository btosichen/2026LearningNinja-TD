    const osc = audioCtx.createOscillator();

/* 【一】分配點數相關函式 */
function initAllocationSliders() {
    const section = document.getElementById('allocation-section');
    section.innerHTML = '';
    const keys = ['programming','data','project','system','logic'];
    const labels = ['💻 程式忍','📊 資料忍','🎯 企劃忍','⚙️ 系統忍','🔮 解題忍'];
    
    keys.forEach((key,i) => {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-4';
        div.innerHTML = `
            <span class="w-28 font-bold text-sm">${labels[i]}</span>
            <input type="range" min="0" max="100" value="${allocatedPoints[key]}" 
                   class="flex-1 accent-indigo-600" id="slider-${key}" 
                   oninput="updateAllocation('${key}', this.value)">
            <span class="w-12 font-mono text-lg text-right" id="val-${key}">${allocatedPoints[key]}</span>
        `;
        section.appendChild(div);
    });
}

function updateAllocation(key, valStr) {
    let val = parseInt(valStr);
    let currentSum = Object.values(allocatedPoints).reduce((a,b)=>a+b,0);
    let old = allocatedPoints[key];
    let newSum = currentSum - old + val;
    
    if (newSum > 100) val = 100 - (currentSum - old);
    
    allocatedPoints[key] = Math.max(0, val);
    document.getElementById(`slider-${key}`).value = allocatedPoints[key];
    document.getElementById(`val-${key}`).innerText = allocatedPoints[key];
    
    const remain = 100 - Object.values(allocatedPoints).reduce((a,b)=>a+b,0);
    document.getElementById('remaining-points').innerText = remain;
    
    updateDashboardStatsWithExtra();
}

function updateDashboardStatsWithExtra() {
    statConfig.forEach(s => {
        const base = currentPlayer.stats[s.key] || 60;
        const extra = allocatedPoints[s.key] || 0;
        document.getElementById(`stat-${s.key}`).innerText = base + extra;

    }
}

/* ==========================================
   5. 主遊戲迴圈（加入暫停、縮放、城堡判斷）
   ========================================== */
function gameLoop() {
    if (gameOver || isPaused) return;   /* 【五】暫停時直接返回 */

    frameCount++;

    /* 被動金幣與冷卻（原有） */
    if (frameCount % 180 === 0) money += 15;
    Object.keys(deployCooldowns).forEach(t => { if (deployCooldowns[t] > 0) deployCooldowns[t]--; });

    /* 【四】縮放（置中版，效果更好） */
    ctx.save();
    const scale = zoomLevel;
    const tx = (canvas.width * (1 - scale)) / 2;
    const ty = (canvas.height * (1 - scale)) / 2;
    ctx.setTransform(scale, 0, 0, scale, tx, ty);

    ctx.fillStyle = currentMap ? currentMap.bgColor : '#dcfce7';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawMap();
    if (waveActive) handleWaveLogic();

    handleParticles();
    updateUI();
    updateDeployButtons();

    ctx.restore();   /* 還原縮放 */

    /* 【二】城堡HP判斷 */
    if (playerCastleHP <= 0) { endGame(false); return; }
    if (enemyCastleHP <= 0) { endGame(true); return; }

    gameLoopId = requestAnimationFrame(gameLoop);
}

    btn.innerText = isPaused ? '▶ 繼續' : '⏸ 暫停';
    if (!isPaused && !gameOver) gameLoop();
    else if (isPaused && gameLoopId) {
        cancelAnimationFrame(gameLoopId);
        gameLoopId = null;
    }
}

/* 【四】縮放 */
function zoomIn() { zoomLevel = Math.min(2.0, zoomLevel + 0.1); }
function zoomOut() { zoomLevel = Math.max(0.5, zoomLevel - 0.1); }

/* ==========================================
   6. 敵人與忍者更新（新增城堡攻擊）
   ========================================== */
function handleEnemies() {
    /* 原有移動/戰鬥 ... */
    if (!target) {
        /* 到達玩家城堡 */
        playerCastleHP -= e.baseDamage;
        /* ... 原有震動 ... */
        toRemove.push(e);
    }
}

function handlePlayerUnits() {
    /* 原有 ... */
    if (n.pathIndex < 0) {
        /* 【二】到達敵方城堡 → 扣敵方城堡HP */
        enemyCastleHP -= Math.floor(n.atk * 0.7) + 30;
        toRemove.push(n);
    }
}

/* ==========================================
   7. UI 更新（新增城堡HP顯示）
   ========================================== */
function updateUI() {
    document.getElementById('ui-money').innerText = money;
    document.getElementById('ui-player-castle').innerText = Math.max(0, playerCastleHP);
    document.getElementById('ui-enemy-castle').innerText = Math.max(0, enemyCastleHP);
    document.getElementById('ui-lord-level').innerText = lordLevel;
    document.getElementById('ui-lord-cost').innerText = lordUpgradeCost;
    
    /* 原有波次顯示 ... */
}

/* ==========================================
   8. 結算（使用城堡HP判斷勝負）
   ========================================== */
function endGame(isWin) {
    gameOver = true;
    document.getElementById('boss-warning').classList.add('hidden');
    showScreen('result-screen');
    document.getElementById('result-player').innerText = `君主：${currentPlayer.name} (Lv.${lordLevel})`;
    const titleEl = document.getElementById('result-title');
    if (isWin) {
        titleEl.innerText = "🏆 成功攻破敵方城堡！稱霸會考！";
        titleEl.className = "text-4xl font-black text-green-500 mb-2";
    } else {
        titleEl.innerText = `💥 玩家城堡淪陷...止步於第 ${currentWave + 1} 關`;
        titleEl.className = "text-4xl font-black text-red-500 mb-2";
    }
}

/* 其餘所有函式（drawMap、handleWaveLogic、spawnEnemy、updateDeployButtons、saveDataAndRestart 等）完全保留原樣 */
