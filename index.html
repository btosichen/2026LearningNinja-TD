<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- 原有 head 內容不變 -->
</head>
<body>
    <!-- 登入、儀表板、結算畫面不變 -->

    <!-- 遊戲畫面 UI 增加城堡升級按鈕 -->
    <div id="game-screen" class="screen flex-col items-center justify-center bg-gray-900">
        <div class="w-full max-w-4xl flex justify-between items-center px-4 py-2 text-white font-bold mb-2">
            <div class="text-xl bg-gray-800 px-3 py-1 rounded-lg border border-gray-600">💰 <span id="ui-money" class="text-yellow-400">200</span></div>
            
            <div class="text-xl flex items-center gap-3 bg-gray-800 px-3 py-1 rounded-lg border border-gray-600">
                <span>👑君主 Lv.<span id="ui-lord-level" class="text-amber-400">1</span> (🏰<span id="ui-castle-hp" class="text-red-400">1000</span>/<span id="ui-castle-max">1000</span>)</span>
                <button onclick="upgradeCastle()" class="btn bg-gradient-to-r from-emerald-400 to-teal-600 text-black text-sm px-4 py-1 rounded-full shadow font-black border border-emerald-300 hover:from-emerald-300 hover:to-teal-500">
                    升級城堡 $<span id="ui-castle-cost">150</span>
                </button>
            </div>

            <div class="text-xl bg-gray-800 px-3 py-1 rounded-lg border border-gray-600 text-center">👾 關卡 <span id="ui-wave" class="text-cyan-400">1/10</span></div>
        </div>

        <!-- 其他畫布、工具列、升級面板不變 -->
    </div>

    <script>
        // ────────────────────────────────────────────────
        //  新增變數：雙方城堡狀態
        // ────────────────────────────────────────────────
        let playerCastle = { hp: 1000, maxHp: 1000, defense: 0.8, counterDmg: 15, upgradeCost: 150, level: 1 };
        let enemyCastle  = { hp: 1500, maxHp: 1500, defense: 0.85, counterDmg: 20, level: 1 };

        // 初始設定（startGame 內）
        function startGame() {
            // ... 原有內容 ...

            playerCastle = { hp: 1000 + lordLevel * 200, maxHp: 1000 + lordLevel * 200, defense: 0.8, counterDmg: 15, upgradeCost: 150, level: 1 };
            enemyCastle  = { hp: 1500, maxHp: 1500, defense: 0.85, counterDmg: 20, level: 1 };

            // ... 其他原有初始化 ...
            updateUI();
        }

        // 玩家升級城堡
        function upgradeCastle() {
            if (money >= playerCastle.upgradeCost) {
                money -= playerCastle.upgradeCost;
                playerCastle.level++;
                playerCastle.maxHp += 400;
                playerCastle.hp += 400;
                playerCastle.defense = Math.min(0.98, playerCastle.defense + 0.04);
                playerCastle.counterDmg += 8;
                playerCastle.upgradeCost = Math.floor(playerCastle.upgradeCost * 1.6);

                playSound('upgrade');
                const hpEl = document.getElementById('ui-castle-hp');
                hpEl.classList.add('scale-125', 'text-green-400');
                setTimeout(() => hpEl.classList.remove('scale-125', 'text-green-400'), 400);

                updateUI();
            }
        }

        // 每關自動升級敵方城堡
        function startWave() {
            if (currentWave >= 10) { endGame(true); return; }

            // 敵方城堡每關升級
            if (currentWave > 0) {
                enemyCastle.level++;
                enemyCastle.maxHp += 800 + currentWave * 300;
                enemyCastle.hp = enemyCastle.maxHp;
                enemyCastle.defense = Math.min(0.97, enemyCastle.defense + 0.03);
                enemyCastle.counterDmg += 12 + currentWave * 2;
            }

            // ... 原有地圖載入等 ...
            updateUI();
        }

        // 修改 updateUI 顯示城堡血量
        function updateUI() {
            document.getElementById('ui-money').innerText = Math.floor(money);
            document.getElementById('ui-lives').innerText = Math.max(0, playerCastle.hp);  // 改用城堡HP
            document.getElementById('ui-max-lives').innerText = playerCastle.maxHp;
            document.getElementById('ui-castle-hp').innerText = Math.max(0, playerCastle.hp);
            document.getElementById('ui-castle-max').innerText = playerCastle.maxHp;
            document.getElementById('ui-lord-level').innerText = lordLevel;
            document.getElementById('ui-castle-cost').innerText = playerCastle.upgradeCost;

            // 錢不夠時變灰
            const castleBtn = document.querySelector('button[onclick="upgradeCastle()"]');
            if (money < playerCastle.upgradeCost) {
                castleBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                castleBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }

            // ... 原有波次顯示 ...
        }

        // 修改 handleEnemies：到達玩家城堡時攻擊城堡
        function handleEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];

                // ... 原有移動邏輯 ...

                let targetIndex = e.pathIndex + 1;
                if (targetIndex < pathPoints.length) {
                    // 正常前進
                    // ...
                } else {
                    // 到達玩家城堡 → 攻擊城堡
                    if (e.cooldown <= 0) {
                        let realDmg = e.baseDamage * (1 - playerCastle.defense);
                        playerCastle.hp -= Math.max(1, Math.floor(realDmg));
                        e.cooldown = 60;  // 攻擊間隔

                        playSound('hit');
                        canvas.style.transform = "translate(10px, 10px)";
                        setTimeout(() => canvas.style.transform = "none", 100);

                        // 城堡反擊
                        if (Math.random() < 0.4) {  // 40% 機率反擊
                            e.hp -= playerCastle.counterDmg;
                            if (e.hp <= 0) {
                                money += e.reward * 0.6;  // 部分獎勵
                                enemies.splice(i, 1);
                                continue;
                            }
                        }
                    }

                    // 城堡HP歸零 → 失敗
                    if (playerCastle.hp <= 0) {
                        endGame(false);
                        return;
                    }
                }

                // ... 繪製部分不變 ...
            }
        }

        // 修改 handleNinjas：到達敵方城堡時攻擊城堡
        function handleNinjas() {
            for (let i = ninjas.length - 1; i >= 0; i--) {
                let n = ninjas[i];

                // ... 原有移動邏輯 ...

                let targetIndex = n.pathIndex - 1;
                if (targetIndex >= 0) {
                    // 正常前進
                    // ...
                } else {
                    // 到達敵方城堡 → 攻擊城堡
                    if (n.cooldown <= 0) {
                        let realDmg = n.dmg * (1 - enemyCastle.defense);
                        enemyCastle.hp -= Math.max(1, Math.floor(realDmg));
                        n.cooldown = n.rate * 1.5;  // 攻城較慢

                        playSound('hit');

                        // 敵方城堡反擊
                        if (Math.random() < 0.35) {
                            n.hp -= enemyCastle.counterDmg;
                            if (n.hp <= 0) {
                                ninjas.splice(i, 1);
                                continue;
                            }
                        }

                        // 擊破敵方城堡 → 勝利（或進入下一關）
                        if (enemyCastle.hp <= 0) {
                            money += 500 + currentWave * 100;
                            waveActive = false;
                            const warnEl = document.getElementById('boss-warning');
                            warnEl.innerHTML = `🏰 成功攻破第${currentWave + 1}關敵方城堡！`;
                            warnEl.classList.remove('hidden', 'text-red-600', 'border-red-600');
                            warnEl.classList.add('text-green-500', 'border-green-500');
                            setTimeout(() => {
                                warnEl.classList.add('hidden');
                                currentWave++;
                                startWave();
                            }, 3000);
                            return;
                        }
                    }
                }

                // ... 繪製部分不變 ...
            }
        }

        // 修改 handleCombat：HP歸零後仍可前進（變成殘影狀態）
        function handleCombat() {
            for (let i = 0; i < ninjas.length; i++) {
                let n = ninjas[i];
                for (let j = 0; j < enemies.length; j++) {
                    let e = enemies[j];
                    let dist = Math.hypot(e.x - n.x, e.y - n.y);

                    if (dist < n.attackRange + e.size + 10) {
                        // 互相攻擊
                        if (n.cooldown <= 0) {
                            let dmg = n.dmg;
                            if (e.isBoss) dmg *= 0.55;
                            e.hp -= dmg;
                            n.cooldown = n.rate;
                            playSound('hit');

                            if (e.hp <= 0) {
                                e.hp = 0;
                                e.speed *= 0.4;      // 變殘影，速度變慢
                                e.isDefeated = true; // 標記為殘影狀態
                            }
                        }

                        if (e.cooldown <= 0) {
                            let dmg = e.attackDmg || 25;
                            n.hp -= dmg;
                            e.cooldown = e.attackRate || 45;
                            playSound('hit');

                            if (n.hp <= 0) {
                                n.hp = 0;
                                n.speed *= 0.35;
                                n.isDefeated = true;
                            }
                        }
                    }
                }
            }
        }

        // 其他函數（如 drawMap、endGame、saveDataAndRestart 等）保持不變
        // 但 endGame 失敗條件改為 playerCastle.hp <= 0
        function endGame(isWin) {
            gameOver = true;
            // ... 原有邏輯 ...
            if (!isWin) {
                titleEl.innerText = `💥 忍之國城堡淪陷...止步於第 ${currentWave + 1} 關`;
            }
        }

    </script>
</body>
</html>
