<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍界學習守衛戰：Learning Ninja TD (會考大魔王版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4;
            overflow: hidden;
            touch-action: none;
        }
        .screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            overflow-y: auto;
        }
        .screen.active {
            display: flex;
        }
        #game-container {
            position: relative;
            display: inline-block;
        }
        canvas {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 4px solid #1f2937;
        }
        .btn { transition: all 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .tower-btn {
            cursor: pointer;
            border: 3px solid transparent;
            min-width: 80px;
        }
        .tower-btn.selected {
            border-color: #fbbf24;
            background-color: #fef3c7;
            transform: translateY(-5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        @keyframes popUp {
            0% { transform: translate(-50%, 10px) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -100%) scale(1); opacity: 1; }
        }
        #upgrade-panel { animation: popUp 0.2s ease-out forwards; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- 1️⃣ 登入畫面 -->
    <div id="login-screen" class="screen active flex-col items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-600">
        <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-md w-full mx-4 border-b-8 border-indigo-700">
            <h1 class="text-4xl font-black text-indigo-700 mb-2">🥷 忍界學習守衛戰</h1>
            <p class="text-gray-500 mb-8 font-bold text-lg">會考大魔王 降臨篇</p>
            
            <div class="mb-6">
                <input type="text" id="player-name" placeholder="請輸入君主姓名 (如: 小明)" 
                    class="w-full px-4 py-3 border-2 border-indigo-200 rounded-xl focus:outline-none focus:border-indigo-500 text-xl text-center font-bold bg-indigo-50">
            </div>
            
            <button id="login-btn" onclick="login()" class="btn w-full bg-indigo-600 text-white font-bold py-4 px-6 rounded-xl text-xl shadow-lg hover:bg-indigo-500">
                進入忍界 (讀取雲端數據)
            </button>
            <p class="mt-4 text-sm text-gray-400">測試帳號：小明、小華、小美</p>
        </div>
    </div>

    <!-- 2️⃣ 數據面板 -->
    <div id="dashboard-screen" class="screen flex-col items-center justify-start py-10 bg-gray-50">
        <div class="bg-white p-6 rounded-3xl shadow-xl w-full max-w-4xl mx-4 flex flex-col items-center">
            <h2 class="text-3xl font-black text-gray-800 mb-2">🥷 忍之國：專屬忍者出戰陣容</h2>
            <p id="ninja-title" class="text-xl text-indigo-600 font-bold mb-4">Lv.1 君主 - 玩家</p>
            
            <div class="w-full max-w-md mb-6 relative">
                <canvas id="radar-chart"></canvas>
            </div>
            
            <!-- 5大忍者網格 -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8 w-full text-center text-sm px-4">
                <div class="bg-red-50 p-3 rounded-xl border-2 border-red-200 shadow-sm"><p class="text-red-600 font-bold text-lg mb-1">💻 程式</p><p id="stat-programming" class="text-2xl font-black text-gray-700">0</p></div>
                <div class="bg-blue-50 p-3 rounded-xl border-2 border-blue-200 shadow-sm"><p class="text-blue-600 font-bold text-lg mb-1">📊 資料</p><p id="stat-data" class="text-2xl font-black text-gray-700">0</p></div>
                <div class="bg-green-50 p-3 rounded-xl border-2 border-green-200 shadow-sm"><p class="text-green-600 font-bold text-lg mb-1">💡 專題</p><p id="stat-project" class="text-2xl font-black text-gray-700">0</p></div>
                <div class="bg-yellow-50 p-3 rounded-xl border-2 border-yellow-200 shadow-sm"><p class="text-yellow-600 font-bold text-lg mb-1">⚙️ 系統</p><p id="stat-system" class="text-2xl font-black text-gray-700">0</p></div>
                <div class="bg-purple-50 p-3 rounded-xl border-2 border-purple-200 shadow-sm"><p class="text-purple-600 font-bold text-lg mb-1">🧩 解決</p><p id="stat-logic" class="text-2xl font-black text-gray-700">0</p></div>
            </div>

            <button onclick="startGame()" class="btn bg-red-600 text-white font-black py-4 px-12 rounded-full text-2xl shadow-xl hover:bg-red-500 animate-pulse border-4 border-red-300">
                ⚔️ 迎戰會考大魔王 (共10關)
            </button>
        </div>
    </div>

    <!-- 3️⃣ 遊戲畫面 -->
    <div id="game-screen" class="screen flex-col items-center justify-center bg-gray-900">
        <div class="w-full max-w-4xl flex justify-between items-center px-4 py-2 text-white font-bold mb-2">
            <div class="text-xl bg-gray-800 px-3 py-1 rounded-lg border border-gray-600">💰 <span id="ui-money" class="text-yellow-400">200</span></div>
            
            <!-- 君主血量與升級系統 -->
            <div class="text-xl flex items-center gap-3 bg-gray-800 px-3 py-1 rounded-lg border border-gray-600">
                <span>👑君主 Lv.<span id="ui-lord-level" class="text-amber-400">1</span> (❤️<span id="ui-lives" class="text-red-400">20</span>/<span id="ui-max-lives">20</span>)</span>
                <button onclick="upgradeLord()" class="btn bg-gradient-to-r from-yellow-400 to-yellow-600 text-black text-sm px-3 py-1 rounded-full shadow font-black border border-yellow-200 hover:from-yellow-300 hover:to-yellow-500">
                    升級 $<span id="ui-lord-cost">100</span>
                </button>
            </div>

            <div class="text-xl bg-gray-800 px-3 py-1 rounded-lg border border-gray-600 text-center">👾 關卡 <span id="ui-wave" class="text-cyan-400">1/10</span></div>
        </div>

        <div id="game-container">
            <!-- 畫布 -->
            <canvas id="game-canvas" width="800" height="500"></canvas>
            
            <!-- 浮動升級面板 (隱藏) -->
            <div id="upgrade-panel" class="hidden absolute bg-white p-3 rounded-xl shadow-2xl border-2 border-indigo-400 z-40 w-48 pointer-events-auto">
                <div id="upg-title" class="text-sm font-black text-gray-800 border-b pb-1 mb-2 text-center">程忍 💻</div>
                <div class="flex justify-between text-xs text-gray-600 mb-1"><span>攻擊力:</span> <span id="upg-dmg" class="font-bold text-red-500">20 ➔ 45</span></div>
                <div class="flex justify-between text-xs text-gray-600 mb-1"><span>攻擊範圍:</span> <span id="upg-range" class="font-bold text-blue-500">30 ➔ 35</span></div>
                <div class="flex justify-between text-xs text-gray-600 mb-3"><span>新稱號:</span> <span id="upg-rank" class="font-bold text-purple-600">熟練🚀</span></div>
                
                <button id="btn-do-upgrade" onclick="doUpgrade()" class="w-full bg-indigo-500 hover:bg-indigo-400 text-white text-sm font-bold py-1.5 rounded shadow">
                    升級 ($<span id="upg-cost">60</span>)

                <button onclick="hideUpgradePanel()" class="w-full mt-1 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs py-1 rounded">取消</button>
            </div>

            <!-- 魔王警告 -->
            <div id="boss-warning" class="hidden absolute top-1/4 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-4xl font-black text-red-600 animate-bounce drop-shadow-2xl bg-white/95 px-8 py-5 rounded-3xl border-4 border-red-600 whitespace-nowrap z-50 pointer-events-none shadow-[0_0_30px_rgba(220,38,38,0.6)]">
                ⚠️ 會考大魔王 來襲！ ⚠️
            </div>
            
            <!-- 忍者派出工具列 (5項忍者角色) -->
            <div class="absolute bottom-2 left-1/2 transform -translate-x-1/2 bg-white/95 px-4 py-2 rounded-2xl shadow-xl flex gap-3 border-2 border-gray-200 overflow-x-auto max-w-full">
                <div onclick="selectTower('programming')" id="btn-tower-programming" class="tower-btn flex flex-col items-center p-2 rounded-xl selected hover:bg-red-50">
                    <div class="text-3xl drop-shadow">💻</div>
                    <div class="text-[11px] font-black text-red-600 mt-1">程忍</div>
                    <div class="text-xs font-bold text-gray-500">$50</div>
                </div>
                <div onclick="selectTower('data')" id="btn-tower-data" class="tower-btn flex flex-col items-center p-2 rounded-xl hover:bg-blue-50">
                    <div class="text-3xl drop-shadow">📊</div>
                    <div class="text-[11px] font-black text-blue-600 mt-1">資忍</div>
                    <div class="text-xs font-bold text-gray-500">$40</div>
                </div>
                <div onclick="selectTower('project')" id="btn-tower-project" class="tower-btn flex flex-col items-center p-2 rounded-xl hover:bg-green-50">
                    <div class="text-3xl drop-shadow">💡</div>
                    <div class="text-[11px] font-black text-green-600 mt-1">專忍</div>
                    <div class="text-xs font-bold text-gray-500">$60</div>
                </div>
                <div onclick="selectTower('system')" id="btn-tower-system" class="tower-btn flex flex-col items-center p-2 rounded-xl hover:bg-yellow-50">
                    <div class="text-3xl drop-shadow">⚙️</div>
                    <div class="text-[11px] font-black text-yellow-600 mt-1">系忍</div>
                    <div class="text-xs font-bold text-gray-500">$80</div>
                </div>
                <div onclick="selectTower('logic')" id="btn-tower-logic" class="tower-btn flex flex-col items-center p-2 rounded-xl hover:bg-purple-50">
                    <div class="text-3xl drop-shadow">🧩</div>
                    <div class="text-[11px] font-black text-purple-600 mt-1">解忍</div>
                    <div class="text-xs font-bold text-gray-500">$70</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4️⃣ 結算畫面 -->
    <div id="result-screen" class="screen flex-col items-center justify-center bg-gray-900 bg-opacity-95">
        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-lg w-full mx-4 text-center border-t-8 border-indigo-500">
            <h1 id="result-title" class="text-4xl font-black text-indigo-600 mb-2">🎉 防守成功！</h1>
            <p id="result-player" class="text-xl font-bold text-gray-600 mb-6">君主：小明</p>
            
            <button id="save-btn" onclick="saveDataAndRestart()" class="btn w-full bg-green-500 text-white font-bold py-4 px-6 rounded-xl text-xl shadow-lg hover:bg-green-400">
                儲存戰績並返回
            </button>
            <p class="mt-4 text-xs text-gray-400 font-mono">✅ 將連線 Google Apps Script 紀錄成績</p>
        </div>
    </div>

    <script>
        /* ==========================================
           0. 音效系統 (保留原樣)
           ========================================== */
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'shoot') {
                osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'boss') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.setValueAtTime(600, now + 0.2); osc.frequency.setValueAtTime(300, now + 0.4);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            } else if (type === 'upgrade') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(1000, now + 0.4);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'lord_upgrade') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(800, now + 0.2); osc.frequency.linearRampToValueAtTime(1200, now + 0.5);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        /* ==========================================
           1. 忍者角色與大魔王資料庫 (已修正為主動移動 + 近戰)
           ========================================== */
        const NINJA_TYPES = {
            programming: { name: '程忍💻', emoji: '💻', color: '#ef4444', 
                levels: [
                    { rank: '新手🐣', dmg: 20, range: 30, rate: 30, cost: 50, upCost: 60, hp: 100, speed: 1.5 },
                    { rank: '熟練🚀', dmg: 45, range: 35, rate: 25, upCost: 120, hp: 150, speed: 1.8 },
                    { rank: '駭客👑', dmg: 100, range: 40, rate: 20, upCost: null, hp: 250, speed: 2.2 }
                ]},
            data: { name: '資忍📊', emoji: '📊', color: '#3b82f6', 
                levels: [
                    { rank: '收集🔍', dmg: 12, range: 30, rate: 35, cost: 40, upCost: 50, hp: 90, speed: 1.4, slow: 0.5 },
                    { rank: '分析📉', dmg: 25, range: 35, rate: 30, upCost: 90, hp: 130, speed: 1.6, slow: 0.3 },
                    { rank: '大數據🌐', dmg: 55, range: 40, rate: 25, upCost: null, hp: 200, speed: 2.0, slow: 0.2 }
                ]},
            project: { name: '專忍💡', emoji: '💡', color: '#22c55e', 
                levels: [
                    { rank: '草案📝', dmg: 15, range: 35, rate: 40, cost: 60, upCost: 75, hp: 140, speed: 1.3 },
                    { rank: '實作🛠️', dmg: 35, range: 40, rate: 35, upCost: 110, hp: 180, speed: 1.5 },
                    { rank: '金獎🏆', dmg: 80, range: 45, rate: 30, upCost: null, hp: 280, speed: 1.8 }
                ]},
            system: { name: '系忍⚙️', emoji: '⚙️', color: '#eab308', 
                levels: [
                    { rank: '架構🧱', dmg: 35, range: 40, rate: 45, cost: 80, upCost: 100, hp: 120, speed: 1.6 },
                    { rank: '整合🔗', dmg: 70, range: 45, rate: 40, upCost: 160, hp: 180, speed: 1.9 },
                    { rank: '架構師🏛️', dmg: 150, range: 50, rate: 35, upCost: null, hp: 300, speed: 2.3 }
                ]},
            logic: { name: '解忍🧩', emoji: '🧩', color: '#a855f7', 
                levels: [
                    { rank: '除錯🐛', dmg: 25, range: 30, rate: 30, cost: 70, upCost: 80, hp: 110, speed: 1.7 },
                    { rank: '最佳化✨', dmg: 55, range: 35, rate: 25, upCost: 140, hp: 160, speed: 2.0 },
                    { rank: '大師🧙‍♂️', dmg: 120, range: 40, rate: 20, upCost: null, hp: 240, speed: 2.4 }
                ]}
        };

        // 5大會考大魔王 (敵人)
        const BOSS_SUBJECTS = [
            { key: 'chinese', label: '會考國文', emoji: '📜' },
            { key: 'english', label: '會考英文', emoji: '🔤' },
            { key: 'math', label: '會考數學', emoji: '📐' },
            { key: 'social', label: '會考社會', emoji: '🌍' },
            { key: 'science', label: '會考自然', emoji: '🔬' }
        ];

        // 10 關地圖 (保留原樣)
        const MAPS = [
            { name: '1. 新手草原', bgColor: '#dcfce7', pathColor: '#86efac', path: [{x:0, y:4}, {x:5, y:4}, {x:5, y:8}, {x:12, y:8}, {x:12, y:3}, {x:15, y:3}] }, 
            { name: '2. 寒冰走廊', bgColor: '#e0f2fe', pathColor: '#7dd3fc', path: [{x:0, y:2}, {x:12, y:2}, {x:12, y:8}, {x:4, y:8}, {x:4, y:5}, {x:15, y:5}] }, 
            { name: '3. 迷失沙漠', bgColor: '#fef3c7', pathColor: '#fcd34d', path: [{x:15, y:7}, {x:8, y:7}, {x:8, y:1}, {x:2, y:1}, {x:2, y:9}, {x:0, y:9}] }, 
            { name: '4. 櫻花小徑', bgColor: '#fce7f3', pathColor: '#f9a8d4', path: [{x:0, y:5}, {x:4, y:5}, {x:4, y:1}, {x:11, y:1}, {x:11, y:8}, {x:15, y:8}] }, 
            { name: '5. 魔法密林', bgColor: '#f3e8ff', pathColor: '#d8b4fe', path: [{x:2, y:0}, {x:2, y:7}, {x:7, y:7}, {x:7, y:2}, {x:12, y:2}, {x:12, y:9}] }, 
            { name: '6. 荒野古道', bgColor: '#ffedd5', pathColor: '#fdba74', path: [{x:0, y:8}, {x:14, y:8}, {x:14, y:1}, {x:1, y:1}, {x:1, y:5}, {x:15, y:5}] }, 
            { name: '7. 蔚藍淺灘', bgColor: '#ccfbf1', pathColor: '#5eead4', path: [{x:0, y:1}, {x:5, y:1}, {x:5, y:8}, {x:10, y:8}, {x:10, y:4}, {x:15, y:4}] }, 
            { name: '8. 古老遺跡', bgColor: '#f3f4f6', pathColor: '#d1d5db', path: [{x:15, y:2}, {x:3, y:2}, {x:3, y:7}, {x:12, y:7}, {x:12, y:9}, {x:0, y:9}] }, 
            { name: '9. 熔岩火山', bgColor: '#fee2e2', pathColor: '#fca5a5', path: [{x:0, y:9}, {x:8, y:9}, {x:8, y:0}, {x:15, y:0}] }, 
            { name: '10. 終極虛空', bgColor: '#1e293b', pathColor: '#475569', path: [{x:0, y:5}, {x:15, y:5}] }
        ];

        const statConfig = [
            { key: 'programming', label: '💻程式' }, { key: 'data', label: '📊資料' },
            { key: 'project', label: '💡專題' }, { key: 'system', label: '⚙️系統' },
            { key: 'logic', label: '🧩解決' }
        ];

        const mockDatabase = {
            "小明": { programming: 85, data: 60, project: 90, system: 75, logic: 80 },
            "小華": { programming: 65, data: 95, project: 70, system: 85, logic: 90 },
            "小美": { programming: 95, data: 90, project: 85, system: 90, logic: 95 }
        };

        let currentPlayer = { name: "", stats: {}, levelStr: "" };
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz9vOO1WaJLvXMbZEs55WMIqeRuVVuijHuTESNG642ppCq8m-sGBHhETdbvMo5T7AYTBw/exec";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function login() {
            initAudio();
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) { alert("請輸入君主姓名！"); return; }
            currentPlayer.name = nameInput;
            
            const loginBtn = document.getElementById('login-btn');
            loginBtn.innerText = "連線讀取成績中..."; loginBtn.disabled = true;

            try {
                const response = await fetch(`${GAS_URL}?name=${encodeURIComponent(nameInput)}`);
                const result = await response.json();
                if (result.success && result.data) {
                    currentPlayer.stats = result.data;
                    statConfig.forEach(s => { if(currentPlayer.stats[s.key] === undefined) currentPlayer.stats[s.key] = Math.floor(Math.random() * 35) + 60; });
                } else { generateRandomStats(nameInput); }
            } catch (error) { generateRandomStats(nameInput); }

            loginBtn.innerText = "進入忍界 (讀取雲端數據)"; loginBtn.disabled = false;
            calculateLevel(); updateDashboard(); showScreen('dashboard-screen');
        }

        function generateRandomStats(name) {
            if (mockDatabase[name]) { currentPlayer.stats = mockDatabase[name]; } 
            else { currentPlayer.stats = {}; statConfig.forEach(s => { currentPlayer.stats[s.key] = Math.floor(Math.random() * 35) + 60; }); }
        }

        function calculateLevel() {
            const stats = Object.values(currentPlayer.stats);
            const avg = stats.reduce((a, b) => a + b) / stats.length;
            let title = avg < 60 ? "🌱 見習君主" : avg < 70 ? "⚔️ 新星領主" : avg < 80 ? "🌀 一方霸主" : avg < 90 ? "👑 王國大帝" : "🌌 忍界神皇";
            currentPlayer.levelStr = `Lv.${Math.floor(avg)} ${title}`;
        }

        let radarChartInstance = null;
        function updateDashboard() {
            document.getElementById('ninja-title').innerText = `${currentPlayer.levelStr} - ${currentPlayer.name}`;
            statConfig.forEach(s => { const el = document.getElementById(`stat-${s.key}`); if(el) el.innerText = currentPlayer.stats[s.key]; });
            const ctx = document.getElementById('radar-chart').getContext('2d');
            const dataValues = statConfig.map(s => currentPlayer.stats[s.key]);
            
            if (radarChartInstance) radarChartInstance.destroy();
            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: statConfig.map(s => s.label),
                    datasets: [{ label: '戰力鑑定', data: dataValues, backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: 'rgba(79, 70, 229, 1)', pointBackgroundColor: 'rgba(67, 56, 202, 1)', borderWidth: 3 }]
                },
                options: { scales: { r: { min: 0, max: 100, ticks: { stepSize: 20 }, pointLabels: { font: { size: 14, weight: '900', family: "'Noto Sans TC', sans-serif" } } } }, plugins: { legend: { display: false } } }
            });
        }

        /* ==========================================
           2. 核心遊戲邏輯 (已修正為「派出忍者沿路主動近戰」)
           ========================================== */
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 50;
        
        let gameLoopId, money = 200, selectedTowerType = 'programming';
        let ninjas = [], enemies = [];
        
        // 君主系統
        let lordLevel = 1, maxLives = 20, lives = 20, lordUpgradeCost = 100;
        
        let currentWave = 0, waveActive = false, bossSpawned = false, frameCount = 0, gameOver = false;
        let path = [], pathPoints = [], currentMap = null;
        let ninjaLevels = {};   // 各忍者類型全球等級 (升級角色能力)

        function startGame() {
            showScreen('game-screen');
            money = 250 + Math.floor(currentPlayer.stats.logic);
            lordLevel = 1; maxLives = 20 + Math.floor(currentPlayer.stats.system / 5); 
            lives = maxLives; lordUpgradeCost = 100;
            
            ninjas = []; enemies = []; currentWave = 0; gameOver = false;
            ninjaLevels = {programming:0, data:0, project:0, system:0, logic:0};
            hideUpgradePanel(); document.getElementById('boss-warning').classList.add('hidden');
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            startWave(); gameLoop();
        }

        function upgradeLord() {
            if(money >= lordUpgradeCost) {
                money -= lordUpgradeCost;
                lordLevel++;
                maxLives += 10;
                lives = maxLives;
                lordUpgradeCost = Math.floor(lordUpgradeCost * 1.5);
                playSound('lord_upgrade');
                const livesEl = document.getElementById('ui-lives');
                livesEl.classList.add('scale-150', 'text-green-400');
                setTimeout(() => livesEl.classList.remove('scale-150', 'text-green-400'), 300);
                updateUI();
            }
        }

        function startWave() {
            if (currentWave >= 10) { endGame(true); return; }
            currentMap = MAPS[currentWave];
            path = currentMap.path;
            pathPoints = path.map(p => ({ x: p.x * GRID_SIZE + 25, y: p.y * GRID_SIZE + 25 }));
            waveActive = true; bossSpawned = false; frameCount = 0; updateUI();
        }

        function selectTower(type) {
            selectedTowerType = type;
            document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('btn-tower-' + type).classList.add('selected');
            hideUpgradePanel();
        }

        let selectedUpgradeType = null;
        function showUpgradePanelForType(type) {
            selectedUpgradeType = type;
            const panel = document.getElementById('upgrade-panel');
            const def = NINJA_TYPES[type];
            const lvl = ninjaLevels[type] || 0;
            const lvlData = def.levels[lvl];
            
            if (!lvlData.upCost) {
                document.getElementById('upg-title').innerText = `${def.name} (已滿級)`;
                document.getElementById('upg-dmg').innerText = lvlData.dmg;
                document.getElementById('upg-range').innerText = lvlData.range;
                document.getElementById('upg-rank').innerText = `${lvlData.rank} (最高級)`;
                document.getElementById('btn-do-upgrade').style.display = 'none';
            } else {
                const nextData = def.levels[lvl + 1];
                document.getElementById('upg-title').innerText = `${def.name} 能力升級`;
                document.getElementById('upg-dmg').innerText = `${lvlData.dmg} ➔ ${nextData.dmg}`;
                document.getElementById('upg-range').innerText = `${lvlData.range} ➔ ${nextData.range}`;
                document.getElementById('upg-rank').innerText = nextData.rank;
                document.getElementById('upg-cost').innerText = nextData.upCost;
                document.getElementById('btn-do-upgrade').style.display = 'block';
            }
            
            panel.style.left = '50%';
            panel.style.top = '25%';
            panel.classList.remove('hidden');
        }

        function hideUpgradePanel() {
            document.getElementById('upgrade-panel').classList.add('hidden');
            selectedUpgradeType = null;
        }

        function doUpgrade() {
            if(!selectedUpgradeType) return;
            const def = NINJA_TYPES[selectedUpgradeType];
            const lvl = ninjaLevels[selectedUpgradeType] || 0;
            const lvlData = def.levels[lvl];
            
            if (lvlData.upCost && money >= lvlData.upCost) {
                money -= lvlData.upCost;
                ninjaLevels[selectedUpgradeType]++;
                playSound('upgrade');
                updateUI();
                showUpgradePanelForType(selectedUpgradeType);
            }
        }

        // 點擊畫布 = 派出忍者 (或點擊現有忍者升級該類型)
        canvas.addEventListener('click', (e) => {
            if(gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            // 點擊現有忍者 → 升級該類型
            let clickedNinja = ninjas.find(n => Math.hypot(n.x - mouseX, n.y - mouseY) < 35);
            if (clickedNinja) {
                showUpgradePanelForType(clickedNinja.type);
                return;
            }
            
            // 派出選定忍者 (從城堡端出發，反向沿路前進)
            const def = NINJA_TYPES[selectedTowerType];
            const lvl = ninjaLevels[selectedTowerType] || 0;
            const lvlData = def.levels[lvl];
            if(money >= lvlData.cost) {
                money -= lvlData.cost;
                const startIdx = pathPoints.length - 1;
                ninjas.push({
                    x: pathPoints[startIdx].x,
                    y: pathPoints[startIdx].y,
                    type: selectedTowerType,
                    level: lvl,
                    pathIndex: startIdx,
                    hp: lvlData.hp,
                    maxHp: lvlData.hp,
                    speed: lvlData.speed,
                    dmg: lvlData.dmg * (1 + (currentPlayer.stats[selectedTowerType] || 60) / 100),
                    rate: lvlData.rate,
                    attackRange: lvlData.range,
                    cooldown: 0,
                    slow: lvlData.slow || null
                });
                playSound('shoot');
                updateUI();
            }
        });

        function gameLoop() {
            if(gameOver) return;
            frameCount++;
            
            ctx.fillStyle = currentMap ? currentMap.bgColor : '#dcfce7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawMap(); 
            handleWaveLogic(); 
            handleEnemies(); 
            handleNinjas(); 
            handleCombat(); 
            updateUI();

            if(lives <= 0) { endGame(false); return; }
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function drawMap() {
            if(!currentMap) return;
            ctx.lineWidth = 44; 
            ctx.strokeStyle = currentMap.pathColor; 
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
            for(let i=1; i<pathPoints.length; i++) ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
            ctx.stroke();
            ctx.lineWidth = 36; ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.stroke();

            ctx.font = '28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('🌀', pathPoints[0].x, pathPoints[0].y);     // 敵方城堡
            ctx.fillText('🏰', pathPoints[pathPoints.length-1].x, pathPoints[pathPoints.length-1].y); // 玩家城堡
            
            ctx.font = 'bold 30px "Noto Sans TC"';
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.textAlign = 'right';
            ctx.fillText(currentMap.name, canvas.width - 20, 40);
        }

        function handleWaveLogic() {
            if (!waveActive) return;
            const bossConfig = BOSS_SUBJECTS[currentWave % 5];

            if (!bossSpawned) {
                if (frameCount % 80 === 0) {
                    const warnEl = document.getElementById('boss-warning');
                    warnEl.innerHTML = `⚠️ 第${currentWave + 1}關【${bossConfig.label}】大魔王 來襲！ ⚠️`;
                    warnEl.classList.remove('hidden');
                    playSound('boss');
                    setTimeout(() => { spawnBoss(currentWave, bossConfig); bossSpawned = true; }, 1500);
                }
            } else if (enemies.length === 0) {
                waveActive = false;
                const warnEl = document.getElementById('boss-warning');
                warnEl.innerHTML = `✅ 攻破【${bossConfig.label}】！陣地轉移...`;
                warnEl.classList.add('border-green-500', 'text-green-600');
                setTimeout(() => { warnEl.classList.add('hidden'); currentWave++; startWave(); }, 2500);
            }
        }

        function spawnBoss(waveIndex, bossConfig) {
            const difficulty = 1 + waveIndex * 0.5;
            enemies.push({
                x: pathPoints[0].x, y: pathPoints[0].y, pathIndex: 0,
                hp: 1200 * difficulty, maxHp: 1200 * difficulty,
                speed: 0.8 + waveIndex * 0.03,
                baseSpeed: 0.8 + waveIndex * 0.03,
                size: 38, reward: 300 + waveIndex * 60,
                isBoss: true, emoji: bossConfig.emoji,
                baseDamage: 8 + Math.floor(waveIndex * 1.8),   // 撞城堡傷害
                attackDmg: 25 + waveIndex * 3,                 // 近戰打忍者傷害
                attackRate: 45,
                cooldown: 0,
                slowTimer: 0, slowFactor: 1.0
            });
        }

        function handleEnemies() {
            for(let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if(e.slowTimer > 0) { e.slowTimer--; e.speed = e.baseSpeed * e.slowFactor; } 
                else { e.speed = e.baseSpeed; }

                let targetIndex = e.pathIndex + 1;
                if(targetIndex < pathPoints.length) {
                    let target = pathPoints[targetIndex];
                    let dx = target.x - e.x, dy = target.y - e.y, dist = Math.hypot(dx, dy);
                    if(dist < e.speed) { 
                        e.x = target.x; e.y = target.y; e.pathIndex++; 
                    } else { 
                        e.x += (dx / dist) * e.speed; e.y += (dy / dist) * e.speed; 
                    }
                } else {
                    lives -= e.baseDamage;
                    playSound('hit');
                    canvas.style.transform = "translate(8px, 8px)";
                    setTimeout(() => canvas.style.transform = "none", 80);
                    enemies.splice(i, 1); continue;
                }

                // 繪製
                ctx.font = `${e.size * 2}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if(e.isBoss) {
                    ctx.shadowColor = "rgba(255,0,0,0.9)"; ctx.shadowBlur = 20;
                    ctx.fillStyle = "red"; ctx.font = 'bold 14px "Noto Sans TC"';
                    ctx.fillText("會考大魔王", e.x, e.y - e.size - 30);
                    ctx.font = `${e.size * 2}px Arial`;
                }
                ctx.fillText(e.emoji, e.x, e.y);
                ctx.shadowBlur = 0;

                // 血條
                ctx.fillStyle = 'red'; ctx.fillRect(e.x - e.size, e.y - e.size - 12, e.size * 2, 8);
                ctx.fillStyle = '#facc15';
                ctx.fillRect(e.x - e.size, e.y - e.size - 12, (e.size * 2) * (Math.max(0, e.hp) / e.maxHp), 8);
            }
        }

        function handleNinjas() {
            for(let i = ninjas.length - 1; i >= 0; i--) {
                let n = ninjas[i];
                if(n.cooldown > 0) n.cooldown--;

                let targetIndex = n.pathIndex - 1;
                if(targetIndex >= 0) {
                    let target = pathPoints[targetIndex];
                    let dx = target.x - n.x, dy = target.y - n.y, dist = Math.hypot(dx, dy);
                    if(dist < n.speed) {
                        n.x = target.x; n.y = target.y; n.pathIndex = targetIndex;
                    } else {
                        n.x += (dx / dist) * n.speed;
                        n.y += (dy / dist) * n.speed;
                    }
                } else {
                    // 到達敵方城堡 → 成功進攻
                    money += 60;
                    ninjas.splice(i, 1);
                    continue;
                }

                // 繪製忍者
                ctx.font = '32px Arial'; ctx.fillText(NINJA_TYPES[n.type].emoji, n.x, n.y);
                
                // 血條
                ctx.fillStyle = '#22c55e'; ctx.fillRect(n.x - 22, n.y - 32, 44, 7);
                ctx.fillStyle = '#86efac';
                ctx.fillRect(n.x - 22, n.y - 32, 44 * (n.hp / n.maxHp), 7);
            }
        }

        function handleCombat() {
            for(let i = 0; i < ninjas.length; i++) {
                let n = ninjas[i];
                for(let j = 0; j < enemies.length; j++) {
                    let e = enemies[j];
                    let dx = e.x - n.x;
                    let dy = e.y - n.y;
                    let dist = Math.hypot(dx, dy);

                    if(dist < n.attackRange + e.size) {
                        // 忍者攻擊
                        if(n.cooldown <= 0) {
                            let dmg = n.dmg;
                            if(e.isBoss) dmg *= 0.55;   // 大魔王防禦力最強
                            e.hp -= dmg;
                            n.cooldown = n.rate;
                            playSound('hit');
                            if(e.hp <= 0) {
                                money += e.reward;
                                enemies.splice(j, 1);
                                j--;
                            }
                        }
                        // 大魔王反擊
                        if(e.cooldown <= 0) {
                            n.hp -= e.attackDmg;
                            e.cooldown = e.attackRate;
                            playSound('hit');
                            if(n.hp <= 0) {
                                ninjas.splice(i, 1);
                                i--;
                                break;
                            }
                        }
                    }
                }
            }
        }

        function updateUI() {
            document.getElementById('ui-money').innerText = Math.floor(money);
            document.getElementById('ui-lives').innerText = Math.max(0, lives);
            document.getElementById('ui-max-lives').innerText = maxLives;
            document.getElementById('ui-lord-level').innerText = lordLevel;
            document.getElementById('ui-lord-cost').innerText = lordUpgradeCost;
            
            const upgBtn = document.querySelector('button[onclick="upgradeLord()"]');
            if(money < lordUpgradeCost) upgBtn.classList.add('opacity-50', 'cursor-not-allowed');
            else upgBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            
            let displayWave = Math.min(10, currentWave + 1);
            document.getElementById('ui-wave').innerHTML = bossSpawned ? 
                `大魔王 <span class="text-sm">(${displayWave}/10)</span>` : `${displayWave}/10`;
            document.getElementById('ui-wave').className = bossSpawned ? "text-red-400 animate-pulse font-black" : "text-cyan-400";
        }

        /* ==========================================
           3. 結算與存檔 (保留原樣)
           ========================================== */
        function endGame(isWin) {
            gameOver = true; document.getElementById('boss-warning').classList.add('hidden');
            hideUpgradePanel(); showScreen('result-screen');
            document.getElementById('result-player').innerText = `君主：${currentPlayer.name} (Lv.${lordLevel})`;
            const titleEl = document.getElementById('result-title');
            
            if(isWin) {
                playSound('boss'); 
                titleEl.innerText = "🏆 登峰造極！稱霸會考十關！"; titleEl.className = "text-4xl font-black text-green-500 mb-2";
            } else {
                playSound('hit');
                titleEl.innerText = `💥 城堡淪陷...止步於第 ${currentWave + 1} 關`; titleEl.className = "text-4xl font-black text-red-500 mb-2";
            }
        }

        async function saveDataAndRestart() {
            const gameData = {
                playerName: currentPlayer.name,
                result: lives > 0 ? 'WIN_10' : `LOSE_AT_WAVE_${currentWave + 1}`,
                remainingLives: lives, lordLevel: lordLevel, moneyEarned: money, timestamp: new Date().toISOString()
            };
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerText = "資料上傳中..."; saveBtn.disabled = true;

            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(gameData), headers: { "Content-Type": "text/plain;charset=utf-8" } });
                alert(`✅ 戰績存檔成功！\n君主等級：Lv.${lordLevel}\n最終關卡：${currentWave + 1}`);
            } catch (error) { alert("❌ 儲存失敗，請檢查網路連線。"); }
            
            saveBtn.innerText = "儲存紀錄並返回"; saveBtn.disabled = false;
            document.getElementById('player-name').value = ''; showScreen('login-screen');
        }
    </script>
</body>
</html>
